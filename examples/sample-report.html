<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotpath — JFR Analysis Report</title>
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      line-height: 1.6;
    }

    header {
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; color: #a78bfa; }
    header .meta-info { font-size: 0.82rem; color: #94a3b8; margin-left: auto; text-align: right; }

    main { max-width: 1400px; margin: 0 auto; padding: 32px 40px; }

    /* Findings summary */
    .findings-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .finding-card {
      border-radius: 10px;
      padding: 16px 24px;
      min-width: 180px;
      flex: 1;
    }
    .finding-card.CRITICAL { background: #3b1010; border: 1px solid #7f1d1d; }
    .finding-card.WARNING  { background: #2d1f05; border: 1px solid #78350f; }
    .finding-card.INFO     { background: #0c1f3a; border: 1px solid #1e3a5f; }
    .finding-card .count   { font-size: 2rem; font-weight: 800; }
    .finding-card.CRITICAL .count { color: #f87171; }
    .finding-card.WARNING  .count { color: #fb923c; }
    .finding-card.INFO     .count { color: #60a5fa; }
    .finding-card .label   { font-size: 0.82rem; color: #94a3b8; margin-top: 4px; }

    /* Findings list */
    .findings-list { margin-bottom: 40px; }
    .finding-item {
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 8px;
      border-left: 4px solid;
    }
    .finding-item.CRITICAL { background: #1f0f0f; border-color: #ef4444; }
    .finding-item.WARNING  { background: #1a1205; border-color: #f97316; }
    .finding-item.INFO     { background: #0a1628; border-color: #3b82f6; }
    .finding-item .f-header { display: flex; align-items: center; gap: 10px; }
    .badge {
      font-size: 0.7rem; font-weight: 700; padding: 2px 8px;
      border-radius: 99px; text-transform: uppercase;
    }
    .badge.CRITICAL { background: #7f1d1d; color: #fca5a5; }
    .badge.WARNING  { background: #78350f; color: #fdba74; }
    .badge.INFO     { background: #1e3a5f; color: #93c5fd; }
    .f-title { font-weight: 600; font-size: 0.95rem; }
    .f-desc  { font-size: 0.85rem; color: #94a3b8; margin-top: 4px; }
    .f-rec   { font-size: 0.82rem; color: #a3e635; margin-top: 4px; }
    .f-rec::before { content: "→ "; }

    /* Sections */
    section { margin-bottom: 48px; }
    section h2 {
      font-size: 1.1rem; font-weight: 700;
      color: #a78bfa; margin-bottom: 20px;
      padding-bottom: 8px; border-bottom: 1px solid #2d3148;
    }

    .chart-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
      gap: 20px;
    }
    .chart-box {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 20px;
    }
    .chart-box h3 { font-size: 0.88rem; color: #94a3b8; margin-bottom: 12px; }

    /* Table */
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { text-align: left; padding: 8px 12px; color: #94a3b8; border-bottom: 1px solid #2d3148; }
    td { padding: 8px 12px; border-bottom: 1px solid #1e2130; }
    tr:hover td { background: #1e2130; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .pct { color: #a78bfa; }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-item {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 14px 16px;
    }
    .stat-item .val { font-size: 1.4rem; font-weight: 700; color: #e2e8f0; }
    .stat-item .lbl { font-size: 0.75rem; color: #64748b; margin-top: 2px; }

    footer {
      text-align: center; padding: 24px;
      color: #334155; font-size: 0.78rem;
      border-top: 1px solid #1e2130; margin-top: 60px;
    }
  </style>
</head>

<script>
(function () {
  if (!DATA) { document.body.innerHTML = '<p style="color:red;padding:40px">데이터 없음</p>'; return; }

  const PLOTLY_LAYOUT = {
    paper_bgcolor: 'transparent', plot_bgcolor: 'transparent',
    font: { color: '#94a3b8', size: 11 },
    margin: { t: 10, b: 40, l: 50, r: 10 },
    xaxis: { gridcolor: '#1e2130', linecolor: '#2d3148' },
    yaxis: { gridcolor: '#1e2130', linecolor: '#2d3148' },
  };
  const PLOTLY_CONFIG = { responsive: true, displayModeBar: false };

  // ── Meta
  const meta = DATA.meta || {};
  document.getElementById('meta-info').innerHTML =
    `<div>${meta.jvmVersion || ''}</div>
     <div>${fmtDuration(meta.startTime, meta.endTime)}</div>`;
  document.getElementById('gen-time').textContent = new Date().toLocaleString('ko-KR');

  // ── Findings
  const findings = DATA.findings || [];
  const counts = { CRITICAL: 0, WARNING: 0, INFO: 0 };
  findings.forEach(f => counts[f.severity] = (counts[f.severity] || 0) + 1);

  document.getElementById('findings-bar').innerHTML =
    Object.entries(counts).map(([sev, n]) => `
      <div class="finding-card ${sev}">
        <div class="count">${n}</div>
        <div class="label">${sev}</div>
      </div>`).join('');

  document.getElementById('findings-list').innerHTML = findings.length === 0
    ? '<p style="color:#64748b">감지된 이슈 없음</p>'
    : findings.map(f => `
        <div class="finding-item ${f.severity}">
          <div class="f-header">
            <span class="badge ${f.severity}">${f.severity}</span>
            <span class="badge" style="background:#1e2130;color:#94a3b8">${f.category}</span>
            <span class="f-title">${f.title}</span>
          </div>
          <div class="f-desc">${f.description}</div>
          <div class="f-rec">${f.recommendation}</div>
        </div>`).join('');

  // ── CPU
  const cpu = DATA.cpu || {};
  document.getElementById('cpu-stats').innerHTML = statCards([
    ['평균 CPU (JVM)', pct(cpu.avgUser)],
    ['최대 CPU (JVM)', pct(cpu.maxUser)],
    ['평균 System CPU', pct(cpu.avgSystem)],
  ]);

  const timeline = DATA.timeline || [];
  if (timeline.length > 0) {
    const xs = timeline.map(b => b.timestamp);
    Plotly.newPlot('chart-cpu-load', [
      { x: xs, y: timeline.map(b => +(b.cpuUser * 100).toFixed(1)),   name: 'JVM User',   type: 'scatter', fill: 'tozeroy', line: { color: '#a78bfa', width: 1.5 }, fillcolor: 'rgba(167,139,250,0.15)' },
      { x: xs, y: timeline.map(b => +(b.cpuSystem * 100).toFixed(1)), name: 'System', type: 'scatter', line: { color: '#f97316', width: 1 } },
    ], { ...PLOTLY_LAYOUT, yaxis: { ...PLOTLY_LAYOUT.yaxis, title: '%', range: [0, 100] } }, PLOTLY_CONFIG);
  }

  const hotMethods = (cpu.hotMethods || []);
  document.getElementById('table-hot-methods').innerHTML = hotMethods.length === 0
    ? noData()
    : `<table><thead><tr><th>#</th><th>Class</th><th>Method</th><th class="num">Samples</th><th class="num">%</th></tr></thead><tbody>
        ${hotMethods.map((m, i) => `<tr>
          <td style="color:#64748b">${i+1}</td>
          <td style="font-size:0.78rem;color:#94a3b8;word-break:break-all">${m.className}</td>
          <td>${m.methodName}</td>
          <td class="num">${m.sampleCount}</td>
          <td class="num pct">${m.percent.toFixed(1)}%</td>
        </tr>`).join('')}
      </tbody></table>`;

  // ── GC
  const gc = DATA.gc || {};
  const gcEvents = gc.events || [];
  document.getElementById('gc-stats').innerHTML = statCards([
    ['GC 횟수',       (gc.totalCount || 0) + '회'],
    ['최대 Pause',    (gc.maxPauseMs || 0) + ' ms'],
    ['평균 Pause',    ((gc.avgPauseMs || 0)).toFixed(0) + ' ms'],
    ['STW 누적',      (gc.totalPauseMs || 0) + ' ms'],
  ]);

  if (gcEvents.length > 0) {
    Plotly.newPlot('chart-gc-timeline',
      [{ x: gcEvents.map(e => new Date(e.startEpochMs).toISOString()), y: gcEvents.map(e => e.pauseMs),
         name: 'Pause ms', type: 'bar', marker: { color: gcEvents.map(e => e.pauseMs > 200 ? '#ef4444' : '#a78bfa') } }],
      { ...PLOTLY_LAYOUT, yaxis: { ...PLOTLY_LAYOUT.yaxis, title: 'ms' } }, PLOTLY_CONFIG);

    Plotly.newPlot('chart-gc-hist',
      [{ x: gcEvents.map(e => e.pauseMs), type: 'histogram', nbinsx: 20,
         marker: { color: '#a78bfa', opacity: 0.8 } }],
      { ...PLOTLY_LAYOUT, xaxis: { ...PLOTLY_LAYOUT.xaxis, title: 'Pause (ms)' }, yaxis: { ...PLOTLY_LAYOUT.yaxis, title: '횟수' } },
      PLOTLY_CONFIG);
  }

  // ── Memory
  const mem = DATA.memory || {};
  document.getElementById('mem-stats').innerHTML = statCards([
    ['최대 힙 사용',   mb(mem.maxHeapBytes)],
    ['평균 힙 사용률', pct(mem.avgHeapUsagePercent)],
    ['총 할당량',      mb(mem.totalAllocatedBytes)],
    ['Alloc Rate',     mb(mem.allocRatePerSec) + '/s'],
  ]);

  if (timeline.length > 0) {
    const xs = timeline.map(b => b.timestamp);
    Plotly.newPlot('chart-heap', [
      { x: xs, y: timeline.map(b => +(b.heapUsed / 1024 / 1024).toFixed(1)), name: '힙 사용 (MB)',
        type: 'scatter', fill: 'tozeroy', line: { color: '#34d399', width: 1.5 }, fillcolor: 'rgba(52,211,153,0.15)' },
    ], { ...PLOTLY_LAYOUT, yaxis: { ...PLOTLY_LAYOUT.yaxis, title: 'MB' } }, PLOTLY_CONFIG);
  }

  const topAlloc = (mem.topAllocators || []);
  document.getElementById('table-allocators').innerHTML = topAlloc.length === 0
    ? noData()
    : `<table><thead><tr><th>#</th><th>Class</th><th class="num">Allocated</th></tr></thead><tbody>
        ${topAlloc.map((a, i) => `<tr>
          <td style="color:#64748b">${i+1}</td>
          <td style="font-size:0.78rem;word-break:break-all">${a.className}</td>
          <td class="num">${mb(a.allocatedBytes)}</td>
        </tr>`).join('')}
      </tbody></table>`;

  // ── Threads
  const threads = DATA.threads || {};
  document.getElementById('thread-stats').innerHTML = statCards([
    ['피크 스레드 수',    (threads.peakThreadCount || 0) + '개'],
    ['평균 스레드 수',    ((threads.avgThreadCount || 0)).toFixed(0) + '개'],
    ['Lock Contention', (threads.totalLockContentionMs || 0) + ' ms'],
  ]);

  const contentions = (threads.topContentions || []);
  document.getElementById('table-contentions').innerHTML = contentions.length === 0
    ? noData()
    : `<table><thead><tr><th>Monitor Class</th><th>Thread</th><th class="num">Wait (ms)</th></tr></thead><tbody>
        ${contentions.map(c => `<tr>
          <td style="font-size:0.78rem;word-break:break-all">${c.monitorClass}</td>
          <td style="font-size:0.82rem">${c.blockedThread}</td>
          <td class="num">${c.waitMs}</td>
        </tr>`).join('')}
      </tbody></table>`;

  // ── Helpers
  function pct(v) { return v != null ? (v * 100).toFixed(1) + '%' : 'N/A'; }
  function mb(v)  { if (!v) return '0 MB'; return (v / 1024 / 1024).toFixed(1) + ' MB'; }
  function noData() { return '<p style="color:#64748b;font-size:0.85rem;padding:8px">데이터 없음</p>'; }
  function statCards(items) {
    return items.map(([lbl, val]) =>
      `<div class="stat-item"><div class="val">${val}</div><div class="lbl">${lbl}</div></div>`
    ).join('');
  }
  function fmtDuration(s, e) {
    if (!s || !e) return '';
    const ms = new Date(e) - new Date(s);
    const sec = Math.floor(ms / 1000);
    return `${new Date(s).toLocaleString('ko-KR')}  ·  ${sec}s`;
  }
})();
</script>
</body>
</html>
