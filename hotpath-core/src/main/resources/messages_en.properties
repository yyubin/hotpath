# ─── CLI ─────────────────────────────────────────────────────────────────────
cli.error.file_not_found=Error: File not found \u2014 %s
cli.info.analyzing=Analyzing [%s]: %s
cli.error.type_unknown=Error: Cannot detect file type. Use --type to specify explicitly.
cli.error.no_stack_entries=Error: No valid stack entries found \u2014 %s
cli.info.done=Done (%d ms) \u2192 %s

# ─── CPU ─────────────────────────────────────────────────────────────────────
cpu.high_usage.title=High CPU usage (max %.0f%%)
cpu.high_usage.desc=JVM CPU usage: max %.0f%%, avg %.0f%%
cpu.high_usage.rec=Check top Hot Methods for unnecessary computation or busy-wait patterns.
cpu.hot_method.title=CPU hotspot in single method: %s#%s (%.1f%%)
cpu.hot_method.desc=%s#%s accounts for %.1f%% of all CPU samples.
cpu.hot_method.rec=Review the algorithm complexity or call frequency of this method.

# ─── GC ──────────────────────────────────────────────────────────────────────
gc.critical_pause.title=GC Stop-The-World max pause %d ms
gc.critical_pause.desc=GC max pause of %d ms can directly impact user-facing latency.
gc.critical_pause.rec=Increase heap size (-Xmx) or consider a low-pause GC algorithm (ZGC, Shenandoah).
gc.high_pause.title=GC pause %d ms detected
gc.high_pause.desc=GC max pause %d ms, avg %.0f ms (%d occurrences total)
gc.high_pause.rec=Analyse GC logs in detail or check heap allocation patterns.
gc.high_stw_ratio.title=GC STW cumulative ratio %.1f%%
gc.high_stw_ratio.desc=%.1f%% of the total recording duration was spent in GC pauses.
gc.high_stw_ratio.rec=Reduce object lifetime and allocation rate.

# ─── Memory ──────────────────────────────────────────────────────────────────
memory.high_heap.title=Heap usage reached %.0f%%
memory.high_heap.desc=Heap usage peaked at %.0f%%. Risk of OutOfMemoryError.
memory.high_heap.rec=Increase -Xmx or check for memory leaks with a heap dump.
memory.top_allocator.title=Top allocator class: %s (%d MB)
memory.top_allocator.desc=%s objects allocated a total of %d MB.
memory.top_allocator.rec=Review allocation frequency and object lifetime for this class.

# ─── Thread ──────────────────────────────────────────────────────────────────
thread.lock_contention.title=Lock contention total %d ms
thread.lock_contention.desc=Thread lock contention consumed a cumulative %d ms.
thread.lock_contention.rec=Reduce synchronization scope or switch to non-blocking structures like ConcurrentHashMap.
thread.worst_lock.title=Longest lock wait: %s (%d ms)
thread.worst_lock.desc=Monitor '%s': thread '%s' waited %d ms.
thread.worst_lock.rec=Reduce the work inside the critical section that acquires this monitor.

# ─── FlameGraph ───────────────────────────────────────────────────────────────
flamegraph.critical_bottleneck.title=Critical CPU bottleneck: %s (self %.1f%%)
flamegraph.critical_bottleneck.desc=Method '%s' alone accounts for %.1f%% of all samples.
flamegraph.critical_bottleneck.rec=Prioritise reviewing the algorithm complexity and call frequency of this method.
flamegraph.cpu_focus.title=CPU concentration in single method: %s (self %.1f%%)
flamegraph.cpu_focus.desc=Method '%s' accounts for %.1f%% of all samples.
flamegraph.cpu_focus.rec=Check whether there is room to optimise the internal logic of this method.
flamegraph.deep_stack.title=Abnormally deep stack detected (max depth %d)
flamegraph.deep_stack.desc=Stack max depth is %d, suggesting excessive recursion or a very deep call chain.
flamegraph.deep_stack.rec=Check for StackOverflowError risk and consider converting recursion to iteration.
flamegraph.jvm_internal.title=High JVM interpreter/JIT ratio (%.1f%%)
flamegraph.jvm_internal.desc=%.1f%% of samples were collected in JVM internal frames ([unknown], Interpreter, etc.).
flamegraph.jvm_internal.rec=Ensure JVM warm-up is complete; run the application through a warm-up phase before profiling.
flamegraph.low_app_code.title=Low application code ratio (%.1f%%)
flamegraph.low_app_code.desc=Only %.1f%% of samples were collected in application code. Most time is spent in frameworks or JDK.
flamegraph.low_app_code.rec=Check for I/O waits, framework overhead, and serialisation costs.
