# ─── CLI ─────────────────────────────────────────────────────────────────────
cli.error.file_not_found=오류: 파일을 찾을 수 없습니다 \u2014 %s
cli.info.analyzing=분석 중 [%s]: %s
cli.error.type_unknown=오류: 파일 타입을 감지할 수 없습니다. --type 옵션으로 명시해 주세요.
cli.error.no_stack_entries=오류: 유효한 스택 항목을 찾을 수 없습니다 \u2014 %s
cli.info.done=완료 (%d ms) \u2192 %s

# ─── CPU ─────────────────────────────────────────────────────────────────────
cpu.high_usage.title=높은 CPU 사용률 (최대 %.0f%%)
cpu.high_usage.desc=JVM CPU 사용률 최대 %.0f%%, 평균 %.0f%%
cpu.high_usage.rec=Hot Method 상위 항목을 확인하고 불필요한 계산이나 바쁜 대기(busy-wait)가 없는지 점검하세요.
cpu.hot_method.title=단일 메서드 CPU 집중: %s#%s (%.1f%%)
cpu.hot_method.desc=%s#%s 메서드가 전체 CPU 샘플의 %.1f%%를 차지합니다.
cpu.hot_method.rec=해당 메서드의 알고리즘 복잡도 또는 호출 빈도를 검토하세요.

# ─── GC ──────────────────────────────────────────────────────────────────────
gc.critical_pause.title=GC Stop-The-World 최대 일시 정지 %d ms
gc.critical_pause.desc=GC 최대 일시 정지 시간이 %d ms로 사용자 요청에 직접적인 영향을 줄 수 있습니다.
gc.critical_pause.rec=힙 크기(-Xmx)를 늘리거나 GC 알고리즘(ZGC, Shenandoah)을 검토하세요.
gc.high_pause.title=GC 일시 정지 %d ms 감지
gc.high_pause.desc=GC 최대 일시 정지 %d ms, 평균 %.0f ms (총 %d회)
gc.high_pause.rec=GC 로그를 상세 분석하거나 힙 할당 패턴을 확인하세요.
gc.high_stw_ratio.title=GC STW 누적 비율 %.1f%%
gc.high_stw_ratio.desc=전체 녹화 시간 중 %.1f%%가 GC 일시 정지에 사용되었습니다.
gc.high_stw_ratio.rec=객체 생존 기간과 할당률을 줄이는 방향으로 코드를 개선하세요.

# ─── Memory ──────────────────────────────────────────────────────────────────
memory.high_heap.title=힙 사용률 %.0f%% 도달
memory.high_heap.desc=힙 사용률이 최대 %.0f%%까지 상승했습니다. OutOfMemoryError 위험이 있습니다.
memory.high_heap.rec=-Xmx를 늘리거나 메모리 누수 여부를 heap dump로 확인하세요.
memory.top_allocator.title=최다 할당 클래스: %s (%d MB)
memory.top_allocator.desc=%s 타입 객체가 총 %d MB 할당되었습니다.
memory.top_allocator.rec=해당 클래스의 객체 생성 빈도와 생존 기간을 검토하세요.

# ─── Thread ──────────────────────────────────────────────────────────────────
thread.lock_contention.title=Lock Contention 누적 %d ms
thread.lock_contention.desc=스레드 락 경합으로 누적 %d ms가 소비되었습니다.
thread.lock_contention.rec=동기화 범위를 줄이거나 ConcurrentHashMap 등 non-blocking 자료구조로 교체를 검토하세요.
thread.worst_lock.title=최장 락 대기: %s (%d ms)
thread.worst_lock.desc=%s 모니터에서 '%s' 스레드가 %d ms 대기했습니다.
thread.worst_lock.rec=해당 모니터를 획득하는 임계 구역(critical section)의 작업량을 줄이세요.

# ─── FlameGraph ───────────────────────────────────────────────────────────────
flamegraph.critical_bottleneck.title=심각한 CPU 병목: %s (self %.1f%%)
flamegraph.critical_bottleneck.desc='%s' 메서드가 전체 샘플의 %.1f%%를 단독으로 차지합니다.
flamegraph.critical_bottleneck.rec=해당 메서드의 알고리즘 복잡도와 호출 빈도를 우선적으로 점검하세요.
flamegraph.cpu_focus.title=특정 메서드에 CPU 집중: %s (self %.1f%%)
flamegraph.cpu_focus.desc='%s' 메서드가 전체 샘플의 %.1f%%를 차지합니다.
flamegraph.cpu_focus.rec=해당 메서드 내부 로직에 최적화 여지가 있는지 확인하세요.
flamegraph.deep_stack.title=비정상적으로 깊은 스택 감지 (최대 깊이 %d)
flamegraph.deep_stack.desc=스택 최대 깊이가 %d으로, 재귀 호출이나 지나치게 깊은 호출 체인이 의심됩니다.
flamegraph.deep_stack.rec=StackOverflowError 위험이 있는지 확인하고, 재귀를 반복문으로 전환하는 것을 고려하세요.
flamegraph.jvm_internal.title=JVM 인터프리터/JIT 비중 높음 (%.1f%%)
flamegraph.jvm_internal.desc=샘플의 %.1f%%가 JVM 내부 프레임([unknown], Interpreter 등)에서 수집됐습니다.
flamegraph.jvm_internal.rec=JVM 워밍업이 충분히 이루어졌는지 확인하고, 프로파일링 시작 전 애플리케이션을 충분히 예열하세요.
flamegraph.low_app_code.title=애플리케이션 코드 비중 낮음 (%.1f%%)
flamegraph.low_app_code.desc=샘플의 %.1f%%만이 애플리케이션 코드에서 수집됐습니다. 대부분의 시간이 프레임워크나 JDK에서 소비되고 있습니다.
flamegraph.low_app_code.rec=I/O 대기, 프레임워크 오버헤드, 직렬화 비용 등을 점검하세요.
